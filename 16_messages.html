<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="logo-v.png" type="image/png" />
    <title>Vidyasetu — Messages</title>
    <link rel="stylesheet" href="ui-system.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0d0d1a;
        --indigo: #5b45e0;
        --indigo-light: #f0eef9;
        --indigo-dark: #3d2db8;
        --teal: #16a27b;
        --teal-light: #f0faf6;
        --coin: #f5a623;
        --coin-light: #fff9ef;
        --danger: #e84040;
        --surface: #f7f8fa;
        --card: #ffffff;
        --border: #e5e7eb;
        --muted: #9ca3af;
        --body: #4b5563;
        --sidebar-w: 256px;
        --inbox-w: 320px;
      }
      [data-theme="dark"] {
        --ink: #e8eeff;
        --indigo: #818cf8;
        --indigo-light: rgba(129, 140, 248, 0.14);
        --indigo-dark: #6366f1;
        --teal: #34d399;
        --teal-light: rgba(52, 211, 153, 0.13);
        --coin: #fbbf24;
        --coin-light: rgba(251, 191, 36, 0.14);
        --danger: #f87171;
        --surface: #060d1a;
        --card: #0d1829;
        --border: #1a2d4a;
        --muted: #4a5568;
        --body: #94a3b8;
      }

      /* Sidebar — Premium Glass */
      [data-theme="dark"] .sidebar {
        background: rgba(13, 24, 41, 0.95);
        border-right-color: rgba(129, 140, 248, 0.12);
        backdrop-filter: blur(20px);
      }
      [data-theme="dark"] .sb-top {
        border-bottom-color: rgba(129, 140, 248, 0.1);
      }
      [data-theme="dark"] .sb-item:hover {
        background: rgba(129, 140, 248, 0.08);
        color: var(--ink);
      }
      [data-theme="dark"] .sb-item.active {
        background: rgba(129, 140, 248, 0.15);
        color: var(--indigo);
      }

      /* Inbox List — Frosted */
      [data-theme="dark"] .inbox-list {
        background: rgba(13, 24, 41, 0.85);
        border-right-color: rgba(129, 140, 248, 0.1);
        backdrop-filter: blur(20px);
      }
      [data-theme="dark"] .inbox-header {
        border-bottom-color: rgba(129, 140, 248, 0.1);
      }
      [data-theme="dark"] .search-input {
        background: rgba(6, 13, 26, 0.8);
        border-color: rgba(129, 140, 248, 0.15);
        color: var(--ink);
      }
      [data-theme="dark"] .conv-item {
        border-bottom-color: rgba(255, 255, 255, 0.03);
      }
      [data-theme="dark"] .conv-item:hover {
        background: rgba(129, 140, 248, 0.05);
      }
      [data-theme="dark"] .conv-item.active {
        background: rgba(129, 140, 248, 0.12);
        border-left-color: var(--indigo);
      }

      /* Chat Area */
      [data-theme="dark"] .chat-area {
        background: var(--surface);
      }
      [data-theme="dark"] .chat-header {
        background: rgba(13, 24, 41, 0.85);
        border-bottom-color: rgba(129, 140, 248, 0.1);
        backdrop-filter: blur(20px);
      }
      [data-theme="dark"] .msg.theirs .msg-bubble {
        background: rgba(13, 24, 41, 0.8);
        border-color: rgba(129, 140, 248, 0.15);
        color: var(--ink);
      }
      [data-theme="dark"] .chat-input-area {
        background: rgba(13, 24, 41, 0.95);
        border-top-color: rgba(129, 140, 248, 0.1);
      }
      [data-theme="dark"] .msg-input {
        background: rgba(6, 13, 26, 0.6);
        border-color: rgba(129, 140, 248, 0.15);
        color: var(--ink);
      }

      /* Welcome State */
      [data-theme="dark"] .welcome-chat {
        background: var(--surface);
        color: var(--muted);
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--surface);
        color: var(--ink);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* SIDEBAR REUSE */
      .sidebar {
        width: var(--sidebar-w);
        background: #fff;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s;
        z-index: 100;
        flex-shrink: 0;
      }
      [data-theme="dark"] .sidebar {
        background: var(--card);
      }
      .sb-top {
        padding: 1.5rem 1.2rem 1rem;
        border-bottom: 1px solid var(--border);
      }
      .sb-logo {
        font-family: "DM Serif Display", serif;
        font-size: 1.35rem;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .sb-logo span {
        color: var(--indigo);
      }
      .sb-nav {
        flex: 1;
        padding: 1rem 0.8rem;
        overflow-y: auto;
      }
      .sb-section {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0.4rem 0.6rem;
        margin-top: 1rem;
        margin-bottom: 0.3rem;
      }
      .sb-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.65rem 0.8rem;
        border-radius: 9px;
        text-decoration: none;
        color: var(--body);
        font-size: 0.9rem;
        font-weight: 500;
        transition: all 0.18s;
        cursor: pointer;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
      }
      .sb-item:hover {
        background: var(--surface);
        color: var(--ink);
      }
      .sb-item.active {
        background: var(--indigo-light);
        color: var(--indigo);
        font-weight: 600;
      }
      .sb-item .icon {
        width: 20px;
        text-align: center;
        font-size: 1rem;
        flex-shrink: 0;
      }
      .sb-item .badge {
        margin-left: auto;
        background: var(--indigo);
        color: #fff;
        font-size: 0.68rem;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 99px;
      }

      /* MESSAGES LAYOUT */
      .main {
        flex: 1;
        display: flex;
        min-width: 0;
        position: relative;
      }

      /* INBOX LIST */
      .inbox-list {
        width: var(--inbox-w);
        border-right: 1px solid var(--border);
        background: #fff;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }
      [data-theme="dark"] .inbox-list {
        background: var(--card);
      }
      .inbox-header {
        padding: 1.5rem 1.25rem;
        border-bottom: 1px solid var(--border);
      }
      .inbox-title {
        font-family: "DM Serif Display", serif;
        font-size: 1.4rem;
        margin-bottom: 0.4rem;
      }
      .search-box {
        position: relative;
        margin-top: 0.75rem;
      }
      .search-input {
        width: 100%;
        padding: 0.6rem 0.8rem 0.6rem 2.2rem;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        font-size: 0.85rem;
        outline: none;
      }
      .search-icon {
        position: absolute;
        left: 0.8rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 0.9rem;
      }

      .conv-scroll {
        flex: 1;
        overflow-y: auto;
      }
      .conv-item {
        display: flex;
        gap: 0.85rem;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--surface);
        cursor: pointer;
        transition: all 0.15s;
        border-left: 3px solid transparent;
      }
      .conv-item:hover {
        background: var(--surface);
      }
      .conv-item.active {
        background: var(--indigo-light);
        border-left-color: var(--indigo);
      }
      .conv-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 0.95rem;
        flex-shrink: 0;
      }
      .conv-info {
        flex: 1;
        min-width: 0;
      }
      .conv-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.2rem;
      }
      .conv-name {
        font-size: 0.92rem;
        font-weight: 600;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .conv-time {
        font-size: 0.72rem;
        color: var(--muted);
      }
      .conv-preview {
        font-size: 0.82rem;
        color: var(--body);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .conv-preview.unread {
        color: var(--ink);
        font-weight: 600;
      }
      .unread-dot {
        width: 8px;
        height: 8px;
        background: var(--indigo);
        border-radius: 50%;
        flex-shrink: 0;
        align-self: center;
        margin-left: 4px;
      }

      /* CHAT AREA */
      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #fff;
        min-width: 0;
      }
      [data-theme="dark"] .chat-area {
        background: var(--surface);
      }

      /* CHAT HEADER */
      .chat-header {
        height: 60px;
        padding: 0 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-shrink: 0;
        background: #fff;
        z-index: 10;
      }
      [data-theme="dark"] .chat-header {
        background: var(--card);
      }
      .ch-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 0.75rem;
      }
      .ch-info {
        flex: 1;
      }
      .ch-name {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--ink);
      }
      .ch-status {
        font-size: 0.75rem;
        color: var(--teal);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        background: var(--teal);
        border-radius: 50%;
      }

      /* CHAT MESSAGES */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .msg {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        max-width: 75%;
      }
      .msg.mine {
        align-self: flex-end;
        align-items: flex-end;
      }
      .msg.theirs {
        align-self: flex-start;
        align-items: flex-start;
      }
      .msg-bubble {
        padding: 0.75rem 1rem;
        border-radius: 16px;
        font-size: 0.9rem;
        line-height: 1.5;
        word-break: break-word;
        position: relative;
      }
      .msg.mine .msg-bubble {
        background: var(--indigo);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.theirs .msg-bubble {
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      [data-theme="dark"] .msg.theirs .msg-bubble {
        background: var(--card);
        border-color: var(--border);
      }
      .msg-time {
        font-size: 0.65rem;
        color: var(--muted);
        margin: 0 0.4rem;
      }

      /* CHAT INPUT */
      .chat-input-area {
        padding: 1rem 1.5rem;
        background: #fff;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      [data-theme="dark"] .chat-input-area {
        background: var(--card);
      }
      .input-row {
        display: flex;
        gap: 0.75rem;
        align-items: flex-end;
      }
      .msg-input {
        flex: 1;
        padding: 0.75rem 1rem;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        font-family: inherit;
        font-size: 0.9rem;
        outline: none;
        background: var(--surface);
        resize: none;
        max-height: 120px;
        transition: border-color 0.2s;
      }
      [data-theme="dark"] .msg-input {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--border);
        color: var(--ink);
      }
      .msg-input:focus {
        border-color: var(--indigo);
      }
      .send-btn {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        background: var(--indigo);
        color: #fff;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-size: 1.2rem;
        flex-shrink: 0;
      }
      .send-btn:hover {
        background: var(--indigo-dark);
        transform: translateY(-1px);
      }
      .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* WELCOME STATE */
      .welcome-chat {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--muted);
        padding: 2rem;
        background: var(--surface);
      }
      .wc-icon {
        font-size: 4rem;
        opacity: 0.2;
        margin-bottom: 1rem;
      }

      /* MOBILE */
      @media (max-width: 900px) {
        .sidebar {
          position: fixed;
          transform: translateX(-100%);
          bottom: 0;
          top: 0;
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .inbox-list {
          width: 100%;
          border-right: none;
        }
        .chat-area {
          display: none;
          position: fixed;
          inset: 0;
          z-index: 150;
        }
        .chat-area.active {
          display: flex;
        }
      }
    </style>
    <script src="js/dark-mode.js"></script>
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sb-top">
        <a href="index.html" class="sb-logo"
          ><img src="logo-v.png" alt="V" class="logo-img" /><span
            class="logo-text"
            >vidyasetu</span
          ></a
        >
      </div>
      <nav class="sb-nav">
        <div class="sb-section">Main</div>
        <a href="03_dashboard.html" class="sb-item"
          ><span class="icon">🏠</span> Dashboard</a
        >
        <a href="04_explore.html" class="sb-item"
          ><span class="icon">🔍</span> Explore Teachers</a
        >
        <a href="09_bounty.html" class="sb-item"
          ><span class="icon">🎯</span> Bounty Hub
          <span class="badge" id="sb-bounty-badge">0</span></a
        >
        <a href="15_campus_collab.html" class="sb-item"
          ><span class="icon">☕</span> Campus Collab</a
        >
        <div class="sb-section">Messages</div>
        <a href="16_messages.html" class="sb-item active"
          ><span class="icon">💬</span> My Inbox
          <span class="badge" id="sb-unread-count">0</span></a
        >
        <div class="sb-section">My Learning</div>
        <a href="11_my_sessions.html" class="sb-item"
          ><span class="icon">📅</span> My Sessions</a
        >
        <a href="08_wallet.html" class="sb-item"
          ><span class="icon">🪙</span> Wallet</a
        >
        <div class="sb-section">Account</div>
        <a href="12_my_profile.html" class="sb-item"
          ><span class="icon">👤</span> My Profile</a
        >
      </nav>
    </aside>

    <div class="main">
      <!-- CONVERSATION LIST -->
      <div class="inbox-list">
        <div class="inbox-header">
          <h1 class="inbox-title">Messages</h1>
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input
              type="text"
              class="search-input"
              placeholder="Search conversations..."
            />
          </div>
        </div>
        <div class="conv-scroll" id="convList">
          <div style="padding: 2rem; text-align: center; color: var(--muted)">
            Loading conversations...
          </div>
        </div>
      </div>

      <!-- CHAT WINDOW -->
      <div class="chat-area" id="chatWindow">
        <div class="welcome-chat" id="welcomeChat">
          <div class="wc-icon">💬</div>
          <h2>Your Messages</h2>
          <p>Select a conversation to start chatting.</p>
        </div>

        <!-- Active Chat (hidden by default) -->
        <div
          id="activeChat"
          style="display: none; flex: 1; flex-direction: column"
        >
          <div class="chat-header">
            <button
              onclick="closeChatMobile()"
              style="display: none"
              id="backBtnMobile"
            >
              ←
            </button>
            <div class="ch-avatar" id="activePeerAvatar">?</div>
            <div class="ch-info">
              <div class="ch-name" id="activePeerName">...</div>
              <div class="ch-status">
                <div class="status-dot"></div>
                Online
              </div>
            </div>
            <div class="ch-actions">
              <!-- Add more actions if needed -->
            </div>
          </div>

          <div class="chat-messages" id="chatMessages">
            <!-- Messages go here -->
          </div>

          <div class="chat-input-area">
            <div class="input-row">
              <textarea
                class="msg-input"
                id="msgInput"
                placeholder="Type a message..."
                rows="1"
                onkeydown="handleKey(event)"
              ></textarea>
              <button class="send-btn" id="sendBtn" onclick="sendMsg()">
                ➤
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let CURRENT_CONV = null;
      let REALTIME_CHANNEL = null;

      async function init() {
        await VS.auth.requireLogin();
        if (typeof VS !== "undefined" && VS.ui) VS.ui.updateSidebar();
        loadConversations();
        const params = new URLSearchParams(window.location.search);
        const peerId = params.get("peer");
        if (peerId) openConversation(peerId);
      }

      async function loadConversations() {
        try {
          const list = await VS.dm.conversations();
          const el = document.getElementById("convList");
          if (!list || list.length === 0) {
            el.innerHTML =
              '<div style="padding:3rem 1rem;text-align:center;color:var(--muted)"><div style="font-size:2rem;margin-bottom:.5rem"><i data-lucide="mail" class="icon-inline"></i></div>No messages yet. Start a conversation from a teacher profile!</div>';
            return;
          }
          el.innerHTML = list
            .map(
              (c) => `
      <div class="conv-item ${CURRENT_CONV?.peerId === c.peerId ? "active" : ""}" onclick="openConversation('${c.peerId}', '${c.name}', '${c.color}')">
        <div class="conv-avatar" style="background:${c.color || "var(--indigo)"}">${(c.name || "U")[0]}</div>
        <div class="conv-info">
          <div class="conv-top"><div class="conv-name">${c.name || "Unknown"}</div><div class="conv-time">${formatTime(c.lastAt)}</div></div>
          <div class="conv-preview ${c.unread > 0 ? "unread" : ""}">${c.lastMessage}</div>
        </div>
        ${c.unread > 0 ? '<div class="unread-dot"></div>' : ""}
      </div>`,
            )
            .join("");
          const totalUnread = list.reduce((s, c) => s + c.unread, 0);
          const badge = document.getElementById("sb-unread-count");
          if (badge) {
            badge.textContent = totalUnread;
            badge.style.display = totalUnread > 0 ? "block" : "none";
          }
        } catch (err) {
          console.error("Failed to load conversations:", err);
        }
      }

      async function openConversation(peerId, name, color) {
        if (CURRENT_CONV?.peerId === peerId) return;
        CURRENT_CONV = { peerId, name, color };
        document.getElementById("welcomeChat").style.display = "none";
        document.getElementById("activeChat").style.display = "flex";
        if (window.innerWidth <= 900) {
          document.getElementById("chatWindow").classList.add("active");
          document.getElementById("backBtnMobile").style.display = "block";
        }
        if (!name) {
          const u = await VS.teachers.get(peerId).catch(() => null);
          name = u?.name || "User";
          color = u?.avatar_color || "var(--indigo)";
        }
        const avatarEl = document.getElementById("activePeerAvatar");
        avatarEl.textContent = name[0];
        avatarEl.style.background = color;
        document.getElementById("activePeerName").textContent = name;
        loadHistory(peerId);
        if (REALTIME_CHANNEL) VS.dm.unsubscribe(REALTIME_CHANNEL);
        REALTIME_CHANNEL = VS.dm.subscribe(peerId, (msg) => {
          appendMsg("theirs", msg.content, msg.created_at);
          VS.dm.markRead(peerId);
        });
        VS.dm.markRead(peerId).then(() => loadConversations());
        document
          .querySelectorAll(".conv-item")
          .forEach((el) => el.classList.remove("active"));
        loadConversations();
      }

      async function loadHistory(peerId) {
        const msgsEl = document.getElementById("chatMessages");
        msgsEl.innerHTML =
          '<div style="padding:2rem;text-align:center;color:var(--muted)">Loading history...</div>';
        try {
          const history = await VS.dm.list(peerId);
          const myId = localStorage.getItem("vs_user_id");
          msgsEl.innerHTML = history
            .map((m) => {
              if (m.msg_type === 'system') {
                return `<div class="msg system" style="align-self:center; max-width: 90%; margin: 1rem 0;">
                  <div class="msg-bubble" style="background:var(--indigo-light); color:var(--indigo); border:1px solid rgba(129,140,248,0.3); border-radius:12px; font-size:0.82rem; font-weight:500; text-align:center;">
                    ${m.content.replace(/\n/g, '<br>')}
                  </div>
                </div>`;
              }
              const isMine = m.sender_id === myId;
              return `<div class="msg ${isMine ? "mine" : "theirs"}"><div class="msg-bubble">${m.content}</div><div class="msg-time">${formatTime(m.created_at)}</div></div>`;
            })
            .join("");
          scrollChat();
        } catch (err) {
          msgsEl.innerHTML =
            '<div style="color:var(--danger);padding:1rem">Failed to load messages.</div>';
        }
      }

      async function sendMsg() {
        const inp = document.getElementById("msgInput");
        const text = inp.value.trim();
        if (!text || !CURRENT_CONV) return;
        inp.value = "";
        inp.style.height = "auto";
        try {
          appendMsg("mine", text, new Date().toISOString());
          await VS.dm.send(CURRENT_CONV.peerId, text);
          loadConversations();
        } catch (err) {
          alert("Failed to send: " + err.message);
        }
      }

      function appendMsg(type, content, time) {
        const el = document.createElement("div");
        el.className = `msg ${type}`;
        el.innerHTML = `<div class="msg-bubble">${content}</div><div class="msg-time">${formatTime(time)}</div>`;
        document.getElementById("chatMessages").appendChild(el);
        scrollChat();
      }

      function scrollChat() {
        const el = document.getElementById("chatMessages");
        el.scrollTop = el.scrollHeight;
      }
      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMsg();
        }
      }
      function closeChatMobile() {
        document.getElementById("chatWindow").classList.remove("active");
      }

      function formatTime(iso) {
        if (!iso) return "";
        const date = new Date(iso),
          now = new Date();
        if (date.toDateString() === now.toDateString())
          return date.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          });
        return date.toLocaleDateString([], { month: "short", day: "numeric" });
      }

      document
        .getElementById("msgInput")
        .addEventListener("input", function () {
          this.style.height = "auto";
          this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

      document.addEventListener("DOMContentLoaded", () => {
        if (typeof VS !== "undefined" && VS.auth) init();
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script type="module" src="api.js"></script>
    <script>
      if (typeof lucide !== "undefined") lucide.createIcons();
    </script>
  </body>
</html>
