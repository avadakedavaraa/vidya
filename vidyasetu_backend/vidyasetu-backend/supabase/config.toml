# supabase/config.toml
# Vidyasetu — Supabase project configuration
# https://supabase.com/docs/guides/cli/config

[project]
project_id = "qnyvnenfgavuookqsbom"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
[realtime.tenant_limits]
max_concurrent_users = 200
max_events_per_second = 100
max_bytes_per_second = 100000

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.avatars]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "image/gif"]

[storage.buckets.bounty-files]
public = false
file_size_limit = "50MiB"
allowed_mime_types = [
  "image/jpeg", "image/png", "image/gif", "image/webp",
  "application/pdf", "application/zip",
  "text/plain", "text/html", "text/css", "text/javascript"
]

[storage.buckets.portfolio]
public = true
file_size_limit = "20MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "application/pdf"]

[auth]
enabled = true
site_url = "https://vidyasetu.in"
additional_redirect_urls = [
  "http://localhost:8080",
  "http://localhost:8080/02_login.html",
  "http://localhost:3000",
  "http://127.0.0.1:5500",
  "http://127.0.0.1:5501"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8
password_requirements = "letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false    # We handle OTP ourselves via Edge Functions
secure_password_change = true

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = false   # Enable when you add OAuth

[edge_runtime]
enabled = true
policy = "per_worker"

[analytics]
enabled = true
port = 54327
backend = "postgres"
