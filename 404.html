<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="logo-v.png" type="image/png" />
    <title>Vidyasetu — Page Not Found</title>
    <link rel="stylesheet" href="ui-system.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #0d0d1a;
        --indigo: #5b45e0;
        --indigo-light: #f0eef9;
        --indigo-dark: #3d2db8;
        --teal: #16a27b;
        --surface: #f7f8fa;
        --border: #e5e7eb;
        --muted: #9ca3af;
        --body: #4b5563;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--surface);
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        position: relative;
        overflow: hidden;
      }
      .grid-bg {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 48px 48px;
        opacity: 0.4;
        pointer-events: none;
      }
      .glow {
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(91, 69, 224, 0.1) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      .logo {
        font-family: "DM Serif Display", serif;
        font-size: 1.3rem;
        color: var(--ink);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        position: absolute;
        top: 2rem;
        left: 2rem;
        z-index: 1;
      }
      .logo span {
        color: var(--indigo);
      }
      .content {
        position: relative;
        z-index: 1;
        max-width: 520px;
      }
      .error-code {
        font-family: "JetBrains Mono", monospace;
        font-size: 8rem;
        font-weight: 700;
        line-height: 1;
        color: var(--indigo);
        opacity: 0.15;
        margin-bottom: -1rem;
      }
      .icon-404 {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }
      h1 {
        font-family: "DM Serif Display", serif;
        font-size: 2rem;
        color: var(--ink);
        margin-bottom: 0.6rem;
      }
      p {
        font-size: 1rem;
        color: var(--body);
        line-height: 1.7;
        margin-bottom: 2rem;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
      }
      .btns {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        padding: 0.75rem 1.5rem;
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.92rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        border: none;
      }
      .btn-primary {
        background: var(--indigo);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--indigo-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(91, 69, 224, 0.3);
      }
      .btn-outline {
        background: transparent;
        color: var(--ink);
        border: 1.5px solid var(--border);
      }
      .btn-outline:hover {
        border-color: var(--indigo);
        color: var(--indigo);
        transform: translateY(-2px);
      }
      .suggestions {
        margin-top: 2.5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .sug-link {
        font-size: 0.85rem;
        color: var(--body);
        text-decoration: none;
        transition: color 0.2s;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }
      .sug-link:hover {
        color: var(--indigo);
      }
    </style>
    <style>
      [data-theme="dark"] {
        --ink: #ebe5df;
        --indigo: #8a78e5;
        --indigo-light: rgba(138, 120, 229, 0.15);
        --indigo-dark: #7463d0;
        --teal: #45b08c;
        --teal-light: rgba(69, 176, 140, 0.15);
        --coin: #e8b042;
        --coin-light: rgba(232, 176, 66, 0.15);
        --danger: #d96161;
        --surface: #1c1a19;
        --card: #252220;
        --border: #36312e;
        --muted: #8c8279;
        --body: #bdb3a8;
      }
    </style>
    <script src="js/dark-mode.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="grid-bg"></div>
    <div class="glow"></div>
    <a href="index.html" class="logo"
      ><img src="logo-v.png" alt="V" class="logo-img" /><span class="logo-text"
        >vidyasetu</span
      ></a
    >
    <div class="content">
      <div class="error-code">404</div>
      <img
        src="logo-v.png"
        alt="V"
        style="
          height: 100px;
          width: auto;
          border-radius: 12px;
          margin-bottom: 24px;
        "
      />
      <h1>Bridge not found</h1>
      <p>
        The page you're looking for doesn't exist or has been moved. Let's get
        you back on track.
      </p>
      <div class="btns">
        <a href="03_dashboard.html" class="btn btn-primary"
          >🏠 Go to Dashboard</a
        >
        <a href="index.html" class="btn btn-outline">← Back to Home</a>
      </div>
      <div class="suggestions">
        <a href="04_explore.html" class="sug-link">🔍 Explore Teachers</a>
        <a href="08_wallet.html" class="sug-link">🪙 Wallet</a>
        <a href="11_my_sessions.html" class="sug-link">📅 My Sessions</a>
        <a href="12_my_profile.html" class="sug-link">👤 My Profile</a>
      </div>
    </div>
    <!-- Theme toggle injected by dark-mode.js -->
    <!-- Styles in ui-system.css -->
    <!-- Script in dark-mode.js -->

    <script>
      if (typeof lucide !== "undefined") {
        lucide.createIcons();
      }
    </script>
  </body>
</html>
